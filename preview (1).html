<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>coding.further.h</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    textarea {
      width: 50%;
      padding: 15px;
      border: none;
      outline: none;
      font-family: monospace;
      font-size: 14px;
      background: #020617;
      color: #38bdf8;
    }

    iframe {
      width: 50%;
      border: none;
      background: white;
    }

    .controls {
      position: absolute;
      top: 70px;
      left: 20px;
      z-index: 10;
    }

    button {
      padding: 10px 15px;
      margin-right: 10px;
      background: #38bdf8;
      border: none;
      color: black;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

<header>🚀 coding.further.h — Make Games in Your Browser</header>

<div class="controls">
  <button onclick="runCode()">Run ▶</button>
  <button onclick="clearCode()">Clear 🗑</button>
</div>

<div class="container">
  <textarea id="code">
<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden;">

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let x = 100;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "red";
  ctx.fillRect(x, 100, 50, 50);

  x += 2;
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
  </textarea>

  <iframe id="output"></iframe>
</div>

<script>
function runCode() {
  const code = document.getElementById("code").value;
  const iframe = document.getElementById("output");
  iframe.srcdoc = code;
}

function clearCode() {
  document.getElementById("code").value = "";
  document.getElementById("output").srcdoc = "";
}

// Auto-run on load
runCode();
</script>

</body>
</html>
